name: asset_protection

services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/backend:/app/ai_engine
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/backend/uploads
      - ./data:/app/backend/data
      - ../ai_engine:/app/ai_engine
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

